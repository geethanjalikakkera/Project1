<html class="no-js" lang="">

<meta http-equiv="content-type" content="text/html;charset=UTF-8" />
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title> Letters to Binary | Binary to Letters  </title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Favicon -->
      <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <!-- Animate CSS -->
    <link rel="stylesheet" href="css/animate.min.css">
    <!-- Font-awesome CSS-->
    <link rel="stylesheet" href="css/font-awesome.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
     <!-- Modernizr Js --> 
</head>

<body>
     <!-- Main Body Area Start Here -->
    <div id="wrapper">
	<div class="container text-center">
	<div class="col-md-12 col-sm-12 col-xs-12">
   
  <h2 class="text-white">Binary to Letters </h2>
  <div>
    <textarea type="text"  id="inputBi" class="form-controll in-bi"  /></textarea>
  </div>
  <div class="string-output">
    <p id="answerBi"></p>
  </div>
  <button id="binaryToString" class="btn btn-primary" align="center">Result</button>
  <div id="some_div2" align="center" class="btn btn-danger">30 Seconds</div>
  <div align="center">
   <button href="" class="btn btn-primary" id="next2" align="center" onClick="window.location.reload();" style="display:none;">Try Another one</button>
   </div>
  </div>
</div>
</div>
 
 
<!-- Modal HTML -->
<div id="myModal" class="modal fade">
	<div class="modal-dialog modal-confirm">
		<div class="modal-content">
			<div class="modal-header justify-content-center">
				<div class="icon-box">
					<i class="fa fa-close"> </i>
				</div>
				<button type="button" class="close" data-dismiss="modal" aria-hidden="true"> </button>
			</div>
			<div class="modal-body text-center">
				<h4>Your time is up! </h4>	
				 <button href="" class="btn btn-success" data-dismiss="modal" onClick="window.location.reload();">Try Again</button>
			</div>
		</div>
	</div>

	 </div>
    <!-- Main Body Area End Here -->
    <!-- jquery-->
    <script src="js/jquery.min.js" type="text/javascript"></script>
     <!-- Bootstrap js -->
    <script src="js/bootstrap.min.js" type="text/javascript"></script>
    <!-- WOW JS -->
    <script src="js/wow.min.js"></script>
     
<script>
$('.numberonly').keypress(function (e) {    
    
                var charCode = (e.which) ? e.which : event.keyCode    
    
                if (String.fromCharCode(charCode).match(/[^0-9]/g))    
    
                    return false;                        
    
            });     
$('#inputBi').click(function() {
var timeLeft = 30;
var elem = document.getElementById('some_div2');
var timerId = setInterval(countdown, 1000);

function countdown() {
    if (timeLeft == -1) {
        clearTimeout(timerId);
        doSomething();
    } else {
        elem.innerHTML = timeLeft + ' seconds remaining';
        timeLeft--;
    }
	
	$('#binaryToString').click(function(str) {
	
	document.getElementById("some_div2").style.display = "none"; 
	document.getElementById("binaryToString").style.display = "none"; 
	document.getElementById("next2").style.display = "block"; 
	clearInterval(timerId);
 var str = $('#inputBi').val();
  var biString = str.split(" ");
  var uniString = [];
  for (var i = 0; i < biString.length; i++) {
    uniString.push(String.fromCharCode(parseInt(biString[i], 2)));
  }
  $('#answerBi').html(uniString.join(""));
});
	
}

function doSomething() {
   // alert("Hi");
   $('#myModal').modal('show');
}
 });
 
</script>

</body>

</html>
