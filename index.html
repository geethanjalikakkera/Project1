<script>


const alphaOnlyInput = document.getElementById('input'),
  alphaOnlyPattern = new RegExp('^[a-zA-Z ]+$')

let previousValue = ''

alphaOnlyInput.addEventListener('input', (e) => {
  let currentValue = alphaOnlyInput.value

  if (e.inputType.includes('delete') || alphaOnlyPattern.test(currentValue)) {
    previousValue = currentValue
  }

  alphaOnlyInput.value = previousValue
})

$('#input').click(function() {
var timeLeft = 30;
var elem = document.getElementById('some_div');
var timerId = setInterval(countdown, 1000);

function countdown() {
    if (timeLeft == -1) {
        clearTimeout(timerId);
        doSomething();
    } else {
        elem.innerHTML = timeLeft + ' seconds remaining';
        timeLeft--;
    }
	
// within time excute this function
$('#stringToBinary').click(function(){
	document.getElementById("some_div").style.display = "none"; 
	document.getElementById("stringToBinary").style.display = "none"; 
	document.getElementById("next").style.display = "block"; 
	clearInterval(timerId);
  var str = $('#input').val();
  
  var arr=[];
  var arrBi = [];
  for (var i = 0; i < str.length; i++) {
      arr.push(str.charCodeAt(i));
      arrBi.push(arr[i].toString(2));
  };
  var arrBiJoined = arrBi.join(" ");
  $('#answer').html(arrBiJoined);
  
});
}
function doSomething() {
   // alert("Hi");
   $('#myModal').modal('show');
}
 
});
 
$('#inputBi').click(function() {
var timeLeft = 30;
var elem = document.getElementById('some_div2');
var timerId = setInterval(countdown, 1000);

function countdown() {
    if (timeLeft == -1) {
        clearTimeout(timerId);
        doSomething();
    } else {
        elem.innerHTML = timeLeft + ' seconds remaining';
        timeLeft--;
    }
	
	$('#binaryToString').click(function(str) {
	
	document.getElementById("some_div2").style.display = "none"; 
	document.getElementById("binaryToString").style.display = "none"; 
	document.getElementById("next2").style.display = "block"; 
	clearInterval(timerId);
 var str = $('#inputBi').val();
  var biString = str.split(" ");
  var uniString = [];
  for (var i = 0; i < biString.length; i++) {
    uniString.push(String.fromCharCode(parseInt(biString[i], 2)));
  }
  $('#answerBi').html(uniString.join(""));
});
	
}

function doSomething() {
   // alert("Hi");
   $('#myModal').modal('show');
}
 });


function isNumberKey(evt)
{
	var charCode = (evt.which) ? evt.which : event.keyCode
	if (charCode > 31 && (charCode < 48 || charCode > 57))
	return false;

	return true;
}
